service: centinela-backend

useDotenv: true

provider:
  name: aws
  runtime: python3.14
  memorySize: 1024
  timeout: 29
  iam:
    role: arn:aws:iam::${aws:accountId}:role/LabRole
  environment:
    RAW_BUCKET_NAME: centinela-raw-manuscripts-${sls:stage}
    MD_BUCKET_NAME: centinela-md-manuscripts-${sls:stage}
    PROCESSED_BUCKET_NAME: centinela-processed-manuscripts-${sls:stage}
    TABLE_NAME: centinela-integridad
    QUEUE_URL: !Ref ColaDeLotes

package:
  individually: true 
  patterns:
    - '!./**'

functions:
  GetUploadURL:
    handler: get_upload_url.lambda_handler
    package:
      patterns:
        - get_upload_url.py 
    events:
      - http:
          path: /api/v1/manuscripts/upload-url
          method: post
          cors: true 
  
  ConvertManuscript:
    handler: convert_manuscript.lambda_handler
    timeout: 60
    package:
      patterns:
        - convert_manuscript.py
        - markitdown-deps/**
 
  ClassifyManuscript:
    handler: classify_manuscript.lambda_handler
    package:
      patterns:
        - classify_manuscript.py

  ExtractManuscript:
    handler: extract_manuscript.lambda_handler
    package:
      patterns:
        - extract_manuscript.py

  WorkerLLM:
    handler: worker_llm.lambda_handler
    timeout: 60
    package:
      patterns:
        - worker_llm.py
    environment:
      GROQ_API_KEY: ${env:GROQ_API_KEY}
      GROQ_MODEL: ${env:GROQ_MODEL}
      CONTACT_EMAIL: ${env:CONTACT_EMAIL}
    events:
      - sqs:
          arn: !GetAtt ColaDeLotes.Arn
          batchSize: 25
          maximumBatchingWindow: 5
          functionResponseType: ReportBatchItemFailures

  GetManuscriptStatus:
    handler: get_status.lambda_handler
    package:
      patterns:
        - get_status.py
    events:
      - http:
          path: /api/v1/manuscripts/{id}
          method: get
          cors: true

  GetManuscriptResults:
    handler: get_results.lambda_handler
    package:
      patterns:
        - get_results.py
    events:
      - http:
          path: /api/v1/manuscripts/{id}/results
          method: get
          cors: true

resources:
  Resources:
    CentinelaRawBucket:
      Type: AWS::S3::Bucket
      DependsOn: ConvertManuscriptPermission
      Properties:
        BucketName: centinela-raw-manuscripts-${sls:stage}
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins: ["*"]
              AllowedMethods: [PUT, GET]
              AllowedHeaders: ["*"]
              MaxAge: 3000
        NotificationConfiguration:
          LambdaConfigurations:
            - Event: s3:ObjectCreated:*
              Function: !GetAtt ConvertManuscriptLambdaFunction.Arn

    ConvertManuscriptPermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName: !GetAtt ConvertManuscriptLambdaFunction.Arn
        Principal: s3.amazonaws.com
        SourceArn: arn:aws:s3:::centinela-raw-manuscripts-${sls:stage}

    CentinelaMdBucket:
      Type: AWS::S3::Bucket
      DependsOn: ClassifyManuscriptPermission
      Properties:
        BucketName: centinela-md-manuscripts-${sls:stage}
        NotificationConfiguration:
          LambdaConfigurations:
            - Event: s3:ObjectCreated:*
              Function: !GetAtt ClassifyManuscriptLambdaFunction.Arn

    ClassifyManuscriptPermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName: !GetAtt ClassifyManuscriptLambdaFunction.Arn
        Principal: s3.amazonaws.com
        SourceArn: arn:aws:s3:::centinela-md-manuscripts-${sls:stage}
    
    CentinelaProcessedBucket:
      Type: AWS::S3::Bucket
      DependsOn: ExtractManuscriptPermission
      Properties:
        BucketName: centinela-processed-manuscripts-${sls:stage}
        NotificationConfiguration:
          LambdaConfigurations:
            - Event: s3:ObjectCreated:*
              Function: !GetAtt ExtractManuscriptLambdaFunction.Arn

    ExtractManuscriptPermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName: !GetAtt ExtractManuscriptLambdaFunction.Arn
        Principal: s3.amazonaws.com
        SourceArn: arn:aws:s3:::centinela-processed-manuscripts-${sls:stage}
 
    TablaCentinela:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: centinela-integridad
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE

    ColaDeLotesDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: cola-de-lotes-dlq
        MessageRetentionPeriod: 1209600
        SqsManagedSseEnabled: true

    ColaDeLotes:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: cola-de-lotes
        VisibilityTimeout: 360
        ReceiveMessageWaitTimeSeconds: 20
        SqsManagedSseEnabled: true
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt ColaDeLotesDLQ.Arn
          maxReceiveCount: 3