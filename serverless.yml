service: centinela-backend
provider:
  name: aws
  runtime: python3.14
  memorySize: 1024
  timeout: 30
  # Rol proporcionado por AWS Academy
  iam:
    role: arn:aws:iam::${aws:accountId}:role/LabRole
  environment:
    # Inyectamos el nombre del bucket en las variables de entorno de Lambda
    RAW_BUCKET_NAME: !Ref CentinelaRawBucket
    MD_BUCKET_NAME: !Ref CentinelaMdBucket
    PROCESSED_BUCKET_NAME: !Ref CentinelaProcessedBucket
    TABLE_NAME: Manuscripts                              # <-- AGREGADO (clasificador la necesita)
 
functions:
  get_upload_url:
    handler: get_upload_url.lambda_handler
    events:
      - http:
          path: /api/v1/manuscripts/upload-url
          method: post
          cors: true # Configura CORS en API Gateway
 
  classify_manuscript:
    handler: classify_manuscript.lambda_handler
    events:
      - s3:
          bucket: !Ref CentinelaMdBucket
          event: s3:ObjectCreated:*
 
resources:
  Resources:
    # 1. Bucket S3 para archivos originales (RAW)
    CentinelaRawBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: centinela-raw-manuscripts-${sls:stage}
        # Configuración de CORS INDISPENSABLE para Presigned URLs
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins:
                - "*" # En producción se cambia por la URL de Amplify
              AllowedMethods:
                - PUT
                - GET
              AllowedHeaders:
                - "*"
              MaxAge: 3000
 
    # ---------------------------------------------------------------
    # 2. AGREGADO: faltaba este recurso. provider.environment ya
    #    hacia !Ref CentinelaMdBucket pero el recurso no existia
    #    todavia -> esto rompia el deploy (Unresolved resource).
    # ---------------------------------------------------------------
    #CentinelaMdBucket:
    #  Type: AWS::S3::Bucket
    #  Properties:
    #    BucketName: centinela-md-manuscripts-${sls:stage}
 
    # ---------------------------------------------------------------
    # 3. AGREGADO: mismo problema que el de arriba, faltaba el
    #    recurso para CentinelaProcessedBucket.
    # ---------------------------------------------------------------
    #CentinelaProcessedBucket:
    #  Type: AWS::S3::Bucket
    #  Properties:
    #    BucketName: centinela-processed-manuscripts-${sls:stage}
 
    # 4. Tabla DynamoDB de Ejemplo (Para ir preparando la estructura)
    ManuscriptsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Manuscripts
        AttributeDefinitions:
          - AttributeName: ManuscriptID
            AttributeType: S
        KeySchema:
          - AttributeName: ManuscriptID
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
